# Docker Compose orchestration for The Holding Cell
# Per D-01: Four services - nginx, frontend, backend, cowrie
# Per D-05: Two networks - app-network (nginx/frontend/backend) and cowrie-network (isolated)
# Per D-13: All services restart automatically

services:
  # Nginx reverse proxy (per D-02)
  # Handles all external traffic, routes HTTP/WebSocket to backend, serves frontend static files
  nginx:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-static:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Frontend - Next.js static build (per D-03)
  # Builds static files, nginx serves them directly (no Next.js server in production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend-static:/static
    networks:
      - app-network
    restart: unless-stopped
    # No health check needed - static files served by nginx (per D-11)

  # Backend - FastAPI + Socket.io (per D-04)
  # Runs on port 8000 internally, nginx proxies to it
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - COWRIE_LOG_PATH=${COWRIE_LOG_PATH:-/var/log/cowrie}
      - GEOIP_DB_PATH=${GEOIP_DB_PATH:-/geoip/GeoLite2-Country.mmdb}
      - WEBSOCKET_AUTH_TOKEN=${WEBSOCKET_AUTH_TOKEN:-}  # Per SEC-02: WebSocket authentication
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}  # Per D-04: CORS origins
    volumes:
      - cowrie-logs:${COWRIE_LOG_PATH:-/var/log/cowrie}:ro
      - ./geoip:/geoip:ro
      - persistence-data:/data  # Per D-02: Attack history and analytics
    networks:
      - app-network
      # NOT cowrie-network - backend only accesses logs via volume (per D-06, D-08)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Cowrie honeypot (per D-14)
  # Isolated on cowrie-network, logs shared via volume
  # Per SEC-04: Binds to standard SSH port 22 for realistic honeypot
  cowrie:
    image: cowrie/cowrie:latest
    ports:
      - "22:2222"
      - "23:2223"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - cowrie-network
      # ONLY cowrie-network - isolated from app services (per D-05, D-06, D-08)
    restart: unless-stopped
    # Official image runs as non-root 'cowrie' user by default (per D-17)

# Networks (per D-05)
networks:
  app-network:
    driver: bridge
  cowrie-network:
    driver: bridge
    internal: true  # No external internet access from Cowrie (per D-08)

# Volumes
volumes:
  frontend-static:  # Static files for nginx to serve
  cowrie-logs:      # Shared logs between Cowrie and backend (per D-03)
  persistence-data: # Attack history and analytics (per D-02)