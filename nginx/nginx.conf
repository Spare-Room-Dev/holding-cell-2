# nginx configuration for The Holding Cell
# Per D-02: Nginx handles all external traffic - routes HTTP/WebSocket to backend
# Per D-04: Backend runs on port 8000 internally, nginx proxies to it

# Upstream for backend service (Docker Compose service name)
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # Frontend static files (served from nginx container)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Socket.io WebSocket endpoint (per D-02)
    # Extended timeouts prevent 60-second disconnects
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (prevents 60-second disconnects)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Extended timeouts for long-lived WebSocket connections (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Backend API proxy (for future health check routing)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoint passthrough
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
}