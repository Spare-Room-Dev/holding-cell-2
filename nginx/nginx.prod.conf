# nginx production configuration for The Holding Cell
# Per D-01, D-02: HTTP Basic Auth for dashboard access
# Per D-05, D-07, D-08, D-17: HTTPS with Let's Encrypt SSL, WebSocket proxy
# Per SEC-01: HTTP Basic Auth with htpasswd file
# Per SEC-03: 24-hour WebSocket timeouts preserved from Phase 5

# Map for WebSocket upgrade headers
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream for backend service (Docker Compose service name)
upstream backend {
    server backend:8000;
}

# HTTP server - redirect to HTTPS with ACME challenge support
server {
    listen 80;
    server_name _;  # Will be replaced with actual domain

    # ACME challenge for Let's Encrypt certificate renewal (per D-05, D-06)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS (per D-07)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server - SSL termination and WebSocket proxy
server {
    listen 443 ssl http2;
    server_name _;  # Will be replaced with actual domain

    # SSL certificates from Let's Encrypt (mounted via docker-compose.prod.yml)
    # DOMAIN placeholder replaced with actual domain during deployment
    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # Modern SSL configuration (per RESEARCH.md)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HTTP Basic Auth (per D-01, D-02)
    # Password file created by deploy/setup-htpasswd.sh on server
    auth_basic "The Holding Cell - Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Socket.io WebSocket endpoint (preserving 24-hour timeouts from Phase 5)
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for WebSocket (24 hours per SEC-03)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check endpoint (no auth required - per RESEARCH.md recommendation)
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
}